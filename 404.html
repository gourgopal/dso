<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found - Dynamic Solutions</title>
  <link rel="canonical" href="https://dynamicsolutionodisha.com/404.html" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <style>
    .error-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 70vh;
      text-align: center;
      padding: 2rem;
    }
    .error-code {
      font-size: 8rem;
      font-weight: 900;
      color: var(--primary-color);
      margin-bottom: 1rem;
      line-height: 1;
    }
    .error-title {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }
    .error-msg {
      font-size: 1.1rem;
      color: var(--text-light);
      margin-bottom: 2rem;
      max-width: 600px;
    }
    .error-actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
    }
  </style>

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-PHNLY70PSQ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-PHNLY70PSQ');
  </script>
</head>
<body>
  <div class="error-container">
    <div class="error-code">404</div>
    <h1 class="error-title">Page Not Found</h1>
    <p class="error-msg">Oops! The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
    <div class="error-actions">
      <a href="index.html" class="btn btn-primary">Go to Homepage</a>
      <a href="contact.html" class="btn btn-outline">Contact Us</a>
    </div>
  </div>
